{% extends 'base.html'%}
{% block content %}
<!-- Main Section Start -->
<div class="main-section">
    <div class="page-section nopadding cs-nomargin"
        style="margin-top: 0px;padding-top: 60px;padding-bottom: 60px;margin-bottom: 0px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 ">
                    <div class="user-dashboard loader-holder" style="width:450px; min-height: auto;">
                        <div class="user-holder">
                            <h4 class="text-center" style="margin-bottom: 0;">Forgot Your Password ?</h4>
                            <p class="text-center">Please, Enter your email address, We will send you a link to reset your password.</p>
                            <hr>
                            <div id="restaurant-sets-holder">
                                <form class="form-fields-set foodbakery-dev-restaurant-form" method="post"
                                    action="{% url 'forgot_password' %}" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    
                                    
                                            <div class="row">
                                                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                                    <div class="row">
                                                        
                                                                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                                                    <div class="field-holder">
                                                                        <label>Email</label>
                                                                        <input type="email" name="email" class="form-control" placeholder="Enter Your Email" required>
                                                                    </div>
                                                                </div>
                                                                
                                                                
                                                                
                                                                </div>
                                                           

                                                    </div>
                                                </div>
                                            </div>
                                        
                                    

                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <div class="field-holder">
                                                <div class="payment-holder">
                                                    <input type="submit" value="Continue"
                                                        id="btn-next-restaurant-information" class="bgcolor">
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        {% include 'includes/alerts.html' %}
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Main Section End -->


{% endblock %}
